<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS FULL STABLE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Segoe UI;display:flex;background:#f1f5f9}
.dark{background:#0f172a;color:white}

.sidebar{
width:200px;height:100vh;background:#111827;color:white;padding:10px
}
.sidebar button{
width:100%;margin:5px 0;padding:10px;background:none;border:0;color:white;text-align:left;cursor:pointer
}

.main{flex:1;padding:15px}

.card{background:white;padding:10px;border-radius:8px;margin-bottom:10px}
.dark .card{background:#1e293b;color:white}

input,button{padding:8px;margin:3px}
button{background:#2563eb;color:white;border:0;border-radius:5px;cursor:pointer}

.hidden{display:none}

table{width:100%;border-collapse:collapse}
td,th{padding:6px;border-bottom:1px solid #ddd}

.toast{
position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:6px
}
</style>
</head>

<body>

<div class="sidebar">
<h3>POS</h3>
<button onclick="nav('dash')">Dashboard</button>
<button onclick="nav('stok')">Stok</button>
<button onclick="nav('kasir')">Kasir</button>
<button onclick="nav('history')">History</button>
<button onclick="toggleDark()">Dark</button>
</div>

<div class="main">

<!-- DASH -->
<div id="dash">

<div class="card">
Produk: <b id="pCount"></b><br>
Stok: <b id="sCount"></b><br>
Hari ini: <b id="todayIncome"></b><br>
Total: <b id="allIncome"></b>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<!-- STOK -->
<div id="stok" class="hidden">

<div class="card">
<input id="kode" placeholder="Kode">
<input id="nama" placeholder="Nama">
<input id="beli" type="number" placeholder="Beli">
<input id="jual" type="number" placeholder="Jual">
<input id="stokv" type="number" placeholder="Stok">
<button onclick="add()">Tambah</button>
</div>

<div class="card">
<table>
<thead><tr><th>Nama</th><th>Stok</th><th></th></tr></thead>
<tbody id="tbl"></tbody>
</table>
</div>

</div>

<!-- KASIR -->
<div id="kasir" class="hidden">

<div class="card">
<input id="scan" placeholder="Kode">
<button onclick="addCart()">Tambah</button>
<button onclick="startScan()">Scan</button>
</div>

<div class="card">
<div id="cart"></div>
<h3>Total: <span id="total">0</span></h3>
<button onclick="checkout()">Bayar & Print</button>
</div>

<div id="reader"></div>

</div>

<!-- HISTORY -->
<div id="history" class="hidden">

<div class="card">
<h3>History Penjualan</h3>
</div>

<div id="historyList"></div>

</div>

</div>

<script>

let produk = JSON.parse(localStorage.getItem("p")||"[]");
let trx = JSON.parse(localStorage.getItem("t")||"[]");
let cart = [];
let scanner = null;

/* SAVE */
function save(){
localStorage.setItem("p",JSON.stringify(produk));
localStorage.setItem("t",JSON.stringify(trx));
}

/* NAV */
function nav(x){
["dash","stok","kasir","history"].forEach(i=>{
document.getElementById(i).classList.add("hidden");
});
document.getElementById(x).classList.remove("hidden");

if(x==="history") renderHistory();
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* ADD */
function add(){
produk.push({
id:Date.now(),
kode:kode.value,
nama:nama.value,
beli:+beli.value||0,
jual:+jual.value||0,
stok:+stokv.value||0
});
save();render();
}

/* CART */
function addCart(){
let p = produk.find(x=>x.kode===scan.value);
if(!p){toast("tidak ada");return;}
if(p.stok<=0){toast("habis");return;}

let i = cart.find(x=>x.id===p.id);
if(i) i.qty++; else cart.push({...p,qty:1});

renderCart();
}

/* CART RENDER */
function renderCart(){
let html="", total=0;

cart.forEach(i=>{
total += i.qty*i.jual;
html += `<div>${i.nama} x${i.qty}</div>`;
});

document.getElementById("cart").innerHTML = html;
document.getElementById("total").innerText = total;
}

/* CHECKOUT */
function checkout(){

if(cart.length===0) return;

for(let i of cart){
let p = produk.find(x=>x.id===i.id);
if(!p || p.stok<i.qty){
toast("stok kurang");
return;
}
}

let total = cart.reduce((a,b)=>a+b.qty*b.jual,0);

let t = {
id:Date.now(),
time:new Date().toISOString(),
items:JSON.parse(JSON.stringify(cart)),
total
};

trx.push(t);

cart.forEach(i=>{
let p = produk.find(x=>x.id===i.id);
if(p) p.stok -= i.qty;
});

cart=[];
save();
render();
renderCart();
printStruk(t);
}

/* STRUK */
function printStruk(t){

let w = window.open("", "_blank");
if(!w){toast("popup blocked");return;}

w.document.write(`
<html>
<body style="font-family:monospace;padding:10px">

<center><h3>GUDANG EDY</h3></center>
<hr>

No: ${t.id}<br>
Tgl: ${new Date(t.time).toLocaleString()}

<hr>

${t.items.map(i=>`
${i.nama}<br>
${i.qty} x ${i.jual} = ${i.qty*i.jual}<br>
`).join("")}

<hr>
<b>Total: ${t.total}</b>
<hr>
<center>Terima kasih</center>

</body>
</html>
`);

w.document.close();
w.print();
}

/* HISTORY */
function renderHistory(){

let html="";

if(trx.length===0){
historyList.innerHTML = "<div class='card'>Belum ada transaksi</div>";
return;
}

trx.slice().reverse().forEach(t=>{
html += `
<div class="card">

<b>ID:</b> ${t.id}<br>
<b>Tgl:</b> ${new Date(t.time).toLocaleString()}<br>
<b>Total:</b> ${t.total}

<hr>

${t.items.map(i=>`
${i.nama} (${i.qty}x${i.jual}) = ${i.qty*i.jual}<br>
`).join("")}

</div>
`;
});

historyList.innerHTML = html;
}

/* RENDER */
function render(){

document.getElementById("pCount").innerText = produk.length;
document.getElementById("sCount").innerText =
produk.reduce((a,b)=>a+b.stok,0);

/* income */
let today = new Date().toISOString().split("T")[0];

let tday=0, all=0;

trx.forEach(t=>{
all += t.total;
if(t.time && t.time.startsWith(today)){
tday += t.total;
}
});

todayIncome.innerText = tday;
allIncome.innerText = all;

/* table */
let html="";
produk.forEach(p=>{
html += `
<tr>
<td>${p.nama}</td>
<td>${p.stok}</td>
<td><button onclick="restock(${p.id})">+</button></td>
</tr>`;
});

tbl.innerHTML = html;

/* chart */
if(window.myChart) myChart.destroy();

myChart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:trx.map((t,i)=>i+1),
datasets:[{
label:"penjualan",
data:trx.map(t=>t.total),
borderColor:"blue"
}]
}
});
}

/* RESTOCK */
function restock(id){
let j = prompt("tambah stok");
let p = produk.find(x=>x.id===id);
if(p) p.stok += +j;
save();render();
}

/* SCAN */
function startScan(){

if(scanner){
scanner.stop().then(()=>scanner.clear());
}

scanner = new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10},
txt=>{
scan.value = txt;
addCart();
scanner.stop();
}
);
}

/* TOAST */
function toast(t){
let d=document.createElement("div");
d.className="toast";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}

render();

</script>

</body>
</html>
